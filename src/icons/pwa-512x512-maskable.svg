<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full bleed background for maskable icon -->
  <rect width="512" height="512" fill="#2c3e50"/>
  <!-- Safe zone circle (80% of total size = 410px diameter, centered) -->
  <circle cx="256" cy="256" r="205" fill="#34495e" stroke="#ffffff" stroke-width="8"/>
  <!-- Letter F positioned in safe zone -->
  <text x="256" y="350" font-family="Arial, sans-serif" font-size="200" font-weight="bold" text-anchor="middle" fill="#ffffff">F</text>
</svg>
